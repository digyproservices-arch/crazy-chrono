name: Tests E2E Crazy Chrono

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Possibilité de lancer manuellement depuis GitHub
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Tests E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          E2E_BASE_URL: https://app.crazy-chrono.com
          E2E_BACKEND_URL: https://crazy-chrono-backend.onrender.com
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_STUDENT_CODE: ${{ secrets.E2E_STUDENT_CODE }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: |
            e2e-report/
            test-results/
          retention-days: 30

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: test-results/**/*.png
          retention-days: 30
