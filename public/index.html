<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" sizes="64x64" href="%PUBLIC_URL%/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0D6A7A" />
    <meta name="description" content="Crazy Chrono - Jeu éducatif interactif de rapidité et d'association pour apprendre en s'amusant" />

    <!-- PWA: iOS Safari — mode standalone (supprime les barres navigateur) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Crazy Chrono" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/images/apple-touch-icon.png" />

    <!-- PWA: Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Empêcher le zoom par pinch sur iOS -->
    <meta name="format-detection" content="telephone=no" />

    <title>Crazy Chrono</title>
    <style>
      /* Splash screen PWA — fond teal pendant le chargement */
      html, body {
        background-color: #0D6A7A;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      /* Safe area insets pour les écrans avec encoche (iPhone X+) */
      body {
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
    </style>
  </head>
  <body>
    <noscript>Vous devez activer JavaScript pour utiliser Crazy Chrono.</noscript>
    <div id="root"></div>
  </body>
</html>
