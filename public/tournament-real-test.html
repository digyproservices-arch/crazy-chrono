function log(msg, level = 'info') {
  const area = document.getElementById('logArea');
  const t = new Date().toLocaleTimeString('fr-FR');
  const div = document.createElement('div');
  div.innerHTML = `<span class="t">[${t}]</span> <span class="${level}">${msg}</span>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  while (area.children.length > 300) area.removeChild(area.firstChild);
}

// ═══════════════════════════════════════
// AUTH (multi-stratégie : localStorage → Supabase → backend)
// ═══════════════════════════════════════
function tryLoadTokenFromLocalStorage() {
  // 1) Supabase session stockée par l'app React
  try {
    const sbKey = 'sb-vimtycpjofejtgwejfht-auth-token';
    const raw = localStorage.getItem(sbKey);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed?.access_token) return { token: parsed.access_token, email: parsed?.user?.email || 'session React' };
    }
  } catch {}
  // 2) Fallback cc_auth
  try {
    const auth = JSON.parse(localStorage.getItem('cc_auth') || '{}');
    if (auth?.token) return { token: auth.token, email: auth.email || 'cc_auth' };
  } catch {}
  return null;
}

async function doLogin() {
  const email = document.getElementById('cfgEmail').value;
  const pwd = document.getElementById('cfgPwd').value;
  const st = document.getElementById('authStatus');
  if (!email || !pwd) { st.textContent = '❌ Email + mdp requis'; st.style.color='#f87171'; return; }
  st.textContent = '⏳ Connexion...'; st.style.color = '#fbbf24';

  // Stratégie 1: Supabase client CDN
  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pwd });
    if (!error && data?.session?.access_token) {
      authToken = data.session.access_token;
      st.textContent = `✅ ${data.user.email}`; st.style.color = '#34d399';
      document.getElementById('btnCreate').disabled = false;
      log(`Authentifié via Supabase: ${data.user.email}`, 'ok');
      return;
    }
    if (error) log(`Supabase direct: ${error.message} — tentative via backend...`, 'warn');
  } catch (e) { log(`Supabase CDN: ${e.message} — tentative via backend...`, 'warn'); }

  // Stratégie 2: Auth via le backend Render (POST /api/auth/supabase-login)
  try {
    const r = await fetch(`${apiUrl()}/api/auth/supabase-login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd })
    });
    if (r.ok) {
      const data = await r.json();
      if (data.access_token || data.token) {
        authToken = data.access_token || data.token;
        st.textContent = `✅ ${email} (via backend)`; st.style.color = '#34d399';
        document.getElementById('btnCreate').disabled = false;
        log(`Authentifié via backend: ${email}`, 'ok');
        return;
      }
    }
  } catch (e) { log(`Backend auth: ${e.message}`, 'warn'); }

  // Stratégie 3: Lire le token existant dans localStorage
  const ls = tryLoadTokenFromLocalStorage();
  if (ls) {
    authToken = ls.token;
    st.textContent = `✅ ${ls.email} (session existante)`; st.style.color = '#34d399';
    document.getElementById('btnCreate').disabled = false;
    log(`Token récupéré depuis localStorage: ${ls.email}`, 'ok');
    return;
  }

  st.textContent = '❌ Échec auth — connectez-vous d\'abord via l\'app React'; st.style.color = '#f87171';
  log('❌ Toutes les méthodes d\'auth ont échoué. Connectez-vous sur app.crazy-chrono.com puis revenez ici.', 'err');
}

// Validate token against backend
async function validateToken(token) {
  try {
    const r = await fetch(`${apiUrl()}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
    if (r.ok) { const d = await r.json(); return d.ok ? (d.user?.email || true) : false; }
    return false;
  } catch { return false; }
}

// Auto-load + validate token on page load

  const st = document.getElementById('authStatus');
  const ls = tryLoadTokenFromLocalStorage();
  if (ls) {
    st.textContent = '⏳ Vérification token...'; st.style.color = '#fbbf24';
    const valid = await validateToken(ls.token);
    if (valid) {
      authToken = ls.token;
      const email = typeof valid === 'string' ? valid : ls.email;
      st.textContent = `✅ ${email}`; st.style.color = '#34d399';
      document.getElementById('btnCreate').disabled = false;
      log(`Token valide: ${email}`, 'ok');
    } else {
      st.textContent = '⚠️ Token expiré — cliquez Connexion'; st.style.color = '#f97316';
      log('Token localStorage expiré. Entrez votre mot de passe et cliquez Connexion.', 'warn');
    }

});

// ═══════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════
function apiUrl() { return document.getElementById('cfgServer').value.replace(/\/$/, ''); }
function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` }; }
async function apiPost(path, body) {
  const r = await fetch(`${apiUrl()}${path}`, { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
  if (!r.ok) { const t = await r.text(); throw new Error(`${r.status}: ${t.slice(0, 200)}`); }
  return r.json();
}
async function apiPatch(path, body) {
  const r = await fetch(`${apiUrl()}${path}`, { method: 'PATCH', headers: authHeaders(), body: JSON.stringify(body) });
  if (!r.ok) { const t = await r.text(); throw new Error(`${r.status}: ${t.slice(0, 200)}`); }
  return r.json();
}

// ═══════════════════════════════════════
// STRUCTURE GENERATION
// ═══════════════════════════════════════
function generateStructure() {
  const nCirco = +document.getElementById('cfgCirco').value;
  const nEcoles = +document.getElementById('cfgEcoles').value;
  const nClasses = +document.getElementById('cfgClasses').value;
  const nPlayers = +document.getElementById('cfgPlayers').value;

  let prenomIdx = 0;
  const circos = [];
  for (let c = 0; c < nCirco; c++) {
    const ecoles = [];
    for (let e = 0; e < nEcoles; e++) {
      const classes = [];
      const niveau = NIVEAUX[(c * nEcoles + e) % NIVEAUX.length];
      for (let cl = 0; cl < nClasses; cl++) {
        const students = [];
        for (let s = 0; s < nPlayers; s++) {
          const prenom = PRENOMS[prenomIdx % PRENOMS.length];
          prenomIdx++;
          students.push({
            id: `bot-c${c}e${e}cl${cl}s${s}-${Date.now()}`,
            name: prenom,
            label: `${prenom} (${niveau}-${String.fromCharCode(65 + cl)})`
          });
        }
        classes.push({
          name: `${niveau}-${String.fromCharCode(65 + cl)}`,
          niveau,
          students
        });
      }
      ecoles.push({ name: ECOLE_NAMES[e % ECOLE_NAMES.length], classes });
    }
    circos.push({ name: `Circo ${CIRCO_NAMES[c % CIRCO_NAMES.length]}`, ecoles });
  }

  structure = { circos };
  const totalStudents = nCirco * nEcoles * nClasses * nPlayers;
  const totalClasses = nCirco * nEcoles * nClasses;

  document.getElementById('hCirco').textContent = nCirco;
  document.getElementById('hEcoles').textContent = nCirco * nEcoles;
  document.getElementById('hClasses').textContent = totalClasses;
  document.getElementById('hBots').textContent = totalStudents;

  // Render tree
  let html = '';
  for (const ci of circos) {
    html += `<div class="tree-circo"><span class="tree-circo-name">📍 ${ci.name}</span>`;
    for (const ec of ci.ecoles) {
      html += `<div class="tree-ecole">🏫 ${ec.name}`;
      for (const cl of ec.classes) {
        html += `<div class="tree-classe">📚 ${cl.name}: ${cl.students.map(s => s.name).join(', ')}</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  document.getElementById('structTree').innerHTML = html;
  document.getElementById('structPanel').style.display = '';
  document.getElementById('structInfo').textContent = `— ${nCirco} circo, ${nCirco * nEcoles} écoles, ${totalClasses} classes, ${totalStudents} élèves`;

  return structure;
}

    log(`Tournoi créé: ${tournamentId}`, 'ok');

    // 2. Create Phase 1
    const p1 = await apiPost('/api/tournament/phases', { tournamentId, level: 1, status: 'active' });
    phases[1] = { id: p1.phase.id, groups: [], matches: [], winners: [] };
    log(`Phase 1 créée: ${p1.phase.id}`, 'ok');

    // 3. Create groups for Phase 1 (one per class)
    let groupIdx = 0;
    for (const ci of structure.circos) {
      for (const ec of ci.ecoles) {
        for (const cl of ec.classes) {
          groupIdx++;
          const gName = `${ci.name} / ${ec.name} / ${cl.name}`;
          const studentIds = cl.students.map(s => s.id);
          const gRes = await apiPost('/api/tournament/groups', {
            tournamentId, phaseLevel: 1, name: gName, studentIds
          });
          phases[1].groups.push({
            id: gRes.group.id, name: gName, students: cl.students,
            circo: ci.name, ecole: ec.name, classe: cl.name
          });
        }
      }
    }
    log(`${phases[1].groups.length} groupes Phase 1 créés`, 'ok');

    // 4. Create matches for each group
    const matchConfig = {
      rounds: +document.getElementById('cfgRounds').value,
      duration: +document.getElementById('cfgDuration').value,
      classes: NIVEAUX,
      themes: ['botanique', 'multiplication']
    };
    for (const grp of phases[1].groups) {
      const mRes = await apiPost('/api/tournament/matches', {
        tournamentId, phaseId: phases[1].id, groupId: grp.id, config: matchConfig
      });
      const matchData = mRes.match;
      grp.matchId = matchData.id;
      grp.roomCode = matchData.room_code;
      phases[1].matches.push({ id: matchData.id, roomCode: matchData.room_code, groupId: grp.id, group: grp });
    }
    log(`${phases[1].matches.length} matchs Phase 1 créés`, 'ok');

    document.getElementById('btnLaunch').disabled = false;
    document.getElementById('matchPanel').style.display = '';
    document.getElementById('summaryGrid').style.display = '';
    currentPhase = 1;
    renderPhaseTabs();
    renderMatchGrid();
    updateStats();
    log('✅ Tournoi prêt — cliquez "Lancer la phase suivante"', 'ok');
  } catch (e) {
    log(`Erreur création: ${e.message}`, 'err');
    document.getElementById('btnCreate').disabled = false;
  }
}

// UI RENDERING
// ═══════════════════════════════════════
function renderPhaseTabs() {
  const tabs = document.getElementById('phaseTabs');
  let html = '';
  for (let p = 1; p <= 4; p++) {
    const phase = phases[p];
    const active = p === currentPhase ? 'active' : '';
    const count = phase ? phase.matches.length : 0;
    const names = ['', 'CLASSE', 'ÉCOLE', 'CIRCONSCRIPTION', 'ACADÉMIQUE'];
    html += `<div class="phase-tab ${active}" onclick="switchPhase(${p})">Phase ${p} — ${names[p]} <span class="badge">${count}</span></div>`;
  }
  tabs.innerHTML = html;
}

function switchPhase(p) {
  if (!phases[p]) return;
  currentPhase = p;
  renderPhaseTabs();
  renderMatchGrid();
}

function renderMatchGrid() {
  const grid = document.getElementById('matchGrid');
  const phase = phases[currentPhase];
  if (!phase) { grid.innerHTML = '<p style="color:#64748b">Aucune phase</p>'; return; }

  let html = '';
  for (const m of phase.matches) {
    const am = activeMatches.get(m.id);
    const status = am?.status || 'waiting';
    const players = am?.players || m.group.students.map(s => ({ name: s.label || s.name, score: 0 }));
    const winner = am?.winner;

    html += `<div class="match-card ${status}" id="mc-${m.id}">`;
    html += `<div class="mc-header"><span class="mc-title">${m.group.name}</span><span class="mc-status ${status}">${status.toUpperCase()}</span></div>`;
    html += `<div class="mc-info">🔑 <b>${m.roomCode}</b> | ${m.id.slice(-8)}</div>`;
    html += `<div class="mc-actions">`;
    html += `<button class="btn-watch" onclick="watchMatch('${m.id}','${m.roomCode}')" title="Voir le match en direct">👁️ Direct</button>`;
    html += `</div>`;
    html += `<div class="mc-players">`;
    for (const p of players) {
      const isWinner = winner && p.studentId === winner.studentId;
      html += `<div class="mc-player ${isWinner ? 'winner' : ''}"><span class="pname">${p.name}</span><span class="pscore">${p.score || 0}</span></div>`;
    }
    html += `</div></div>`;
  }
  grid.innerHTML = html;
}

function updateMatchCard(matchId) {
  const am = activeMatches.get(matchId);
  if (!am) return;
  const card = document.getElementById(`mc-${matchId}`);
  if (!card) return;
  card.className = `match-card ${am.status}`;
  const statusEl = card.querySelector('.mc-status');
  if (statusEl) { statusEl.textContent = am.status.toUpperCase(); statusEl.className = `mc-status ${am.status}`; }
  // Update watch button visibility
  const watchBtn = card.querySelector('.btn-watch');
  if (watchBtn) watchBtn.style.display = (am.status === 'playing' || am.status === 'tie') ? '' : 'none';
  const playersEl = card.querySelector('.mc-players');
  if (playersEl) {
    let html = '';
    for (const p of am.players) {
      const isW = am.winner && p.studentId === am.winner.studentId;
      html += `<div class="mc-player ${isW ? 'winner' : ''}"><span class="pname">${p.name}</span><span class="pscore">${p.score || 0}</span></div>`;
    }
    playersEl.innerHTML = html;
  }
}

function updateStats() {
  document.getElementById('hMatchs').textContent = totalMatchesDone;
  document.getElementById('hPhase').textContent = currentPhase || '—';
  document.getElementById('smMatchsDone').textContent = totalMatchesDone;
  document.getElementById('smPairs').textContent = totalPairsValidated;
  document.getElementById('smErrors').textContent = totalErrors;
  const phase = phases[currentPhase];
  document.getElementById('smWinners').textContent = phase ? phase.winners.length : 0;
  // Progress
  if (phase) {
    const pct = phase.matches.length > 0 ? Math.round((totalMatchesDone / phase.matches.length) * 100) : 0;

// ═══════════════════════════════════════
// MONITORING INTEGRATION
// ═══════════════════════════════════════
const monitoringBuffer = [];
let monitoringFlushTimer = null;

function sendMonitoringEvent(label, payload) {
  monitoringBuffer.push({ label, payload, ts: Date.now() });
  // Flush every 5s
  if (!monitoringFlushTimer) {
    monitoringFlushTimer = setTimeout(flushMonitoring, 5000);
  }
}

async function flushMonitoring() {
  monitoringFlushTimer = null;
  if (monitoringBuffer.length === 0) return;
  const events = monitoringBuffer.splice(0, monitoringBuffer.length);
  try {
    await fetch(`${apiUrl()}/api/monitoring/client-diag`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ events })
    });
  } catch (e) { /* non-bloquant */ }
}

async function sendIncident(type, severity, details) {
  const incident = {
    id: `arena-${type}-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`,
    type: `arena:${type}`,
    severity,
    timestamp: new Date().toISOString(),
    details: { ...details, source: 'tournament-real-test', tournamentId },
    sessionInfo: { phase: currentPhase, tournamentId }
  };
  try {
    await fetch(`${apiUrl()}/api/monitoring/incidents`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ incident })
    });
  } catch (e) { /* non-bloquant */ }
}

// ═══════════════════════════════════════
// MATCH WAVE EXECUTION (REAL SOCKET.IO)
// ═══════════════════════════════════════
function getDelay(speed, skillMult) {
  const [min, max] = SPEED_RANGES[speed] || SPEED_RANGES.normal;
  return Math.round((min + Math.random() * (max - min)) * skillMult);
}

function findCorrectPair(zones) {
  const map = {};
  for (const z of zones) {
    const pid = (z.pairId || '').trim();
    if (!pid) continue;
    if (map[pid]) return { a: map[pid], b: z };
    map[pid] = z;
  }
  return null;
}

function connectOrchestratorSocket() {
  if (orchestratorSocket?.connected) return orchestratorSocket;
  orchestratorSocket = io(apiUrl(), { transports: ['websocket', 'polling'] });
  orchestratorSocket.on('connect', () => log('Orchestrateur socket connecté', 'ok'));
  orchestratorSocket.on('arena:tie-waiting-teacher', (data) => {
    log(`⚖️ Égalité match ${data.matchId.slice(-8)} — auto-départage...`, 'warn');
    // Auto-start tiebreaker after bots mark ready
    setTimeout(() => {
      orchestratorSocket.emit('arena:start-tiebreaker', { matchId: data.matchId });
      log(`Départage lancé pour ${data.matchId.slice(-8)}`, 'info');
    }, 3000);
  });
  return orchestratorSocket;
}

async function launchNextPhase() {
  if (!phases[currentPhase]) { log('Aucune phase à lancer', 'err'); return; }
  running = true;
  document.getElementById('btnLaunch').disabled = true;
  document.getElementById('btnStop').disabled = false;

  connectOrchestratorSocket();

  const phase = phases[currentPhase];
  const waveSize = +document.getElementById('cfgWaveSize').value;
  const speed = document.getElementById('cfgSpeed').value;
  const phaseDoneMatchesBefore = totalMatchesDone;

  log(`═══ LANCEMENT PHASE ${currentPhase} — ${phase.matches.length} matchs en vagues de ${waveSize} ═══`, 'info');
  sendMonitoringEvent('arena:phase-start', { phase: currentPhase, matchCount: phase.matches.length, waveSize });

  // Launch matches in waves
  for (let i = 0; i < phase.matches.length && running; i += waveSize) {
    const wave = phase.matches.slice(i, i + waveSize);
    const waveNum = Math.floor(i / waveSize) + 1;
    log(`🌊 Vague ${waveNum}: matchs ${i + 1} à ${i + wave.length}`, 'info');

    // Start all matches in this wave
    const wavePromises = wave.map(m => runSingleMatch(m, speed));
    await Promise.all(wavePromises);

    if (running) log(`✅ Vague ${waveNum} terminée`, 'ok');
    sendMonitoringEvent('arena:wave-done', { phase: currentPhase, waveNum, matchesDone: totalMatchesDone });
  }

  if (!running) { log('⏹ Arrêté par utilisateur', 'warn'); return; }

  // Phase complete
  log(`═══ PHASE ${currentPhase} TERMINÉE — ${phase.winners.length} gagnants sur ${phase.matches.length} matchs ═══`, 'ok');
  log(`📊 Détail gagnants: ${phase.winners.map(w => `${w.name} [${w.fromCirco}/${w.fromEcole}]`).join(', ')}`, 'info');
  sendMonitoringEvent('arena:phase-end', { phase: currentPhase, winners: phase.winners.length, totalPairs: totalPairsValidated, totalErrors });

  // Close phase
  try { await apiPatch(`/api/tournament/phases/${phase.id}/close`, {}); } catch (e) { log(`Warn close phase: ${e.message}`, 'warn'); }

  // Prepare next phase if applicable
  if (currentPhase < 4 && phase.winners.length >= 2) {
    log(`📌 Préparation phase ${currentPhase + 1} avec ${phase.winners.length} gagnants...`, 'info');
    await prepareNextPhase();
    document.getElementById('btnLaunch').disabled = false;
  } else if (currentPhase >= 4) {
    log('🏆 TOURNOI TERMINÉ (phase académique atteinte) !', 'ok');
    if (phase.winners.length > 0) log(`🥇 CHAMPION: ${phase.winners[0].name}`, 'ok');
  } else if (phase.winners.length === 1) {
    log(`🏆 TOURNOI TERMINÉ — un seul gagnant restant: ${phase.winners[0].name}`, 'ok');
  } else {
    log(`⚠ TOURNOI TERMINÉ PRÉMATURÉMENT — ${phase.winners.length} gagnants (besoin ≥2 pour continuer)`, 'warn');
    log(`Vérifiez les logs ci-dessus pour les matchs sans gagnant`, 'warn');
  }
  document.getElementById('btnStop').disabled = true;
  running = false;
}

async function runSingleMatch(matchInfo, speed) {
  const matchId = matchInfo.id;
  const group = matchInfo.group;
  const students = group.students;

  // Init active match state
  activeMatches.set(matchId, {
    status: 'waiting',
    players: students.map((s, i) => ({ studentId: s.id, name: s.label || s.name, score: 0, skillMult: 0.4 + (i / Math.max(students.length - 1, 1)) * 1.6 + (Math.random() - 0.5) * 0.3 })),
    winner: null,
    bots: []
  });
  updateMatchCard(matchId);

  return new Promise((resolve) => {
    const am = activeMatches.get(matchId);
    const bots = [];
    let botsReady = 0;
    let matchEnded = false;

    function onMatchEnd(rawWinner) {
      if (matchEnded) return;
      matchEnded = true;
      am.status = 'finished';

      // Robust winner: always fallback to best-scoring player
      let winner = rawWinner;
      if (!winner || !winner.studentId) {
        const sorted = [...am.players].sort((a, b) => (b.score || 0) - (a.score || 0));
        winner = sorted[0] || null;
        if (winner && !rawWinner) log(`⚠ ${group.name}: pas de winner serveur, fallback → ${winner.name} (${winner.score} pts)`, 'warn');
      }
      am.winner = winner;
      if (winner) {
        phases[currentPhase].winners.push({ studentId: winner.studentId, name: winner.name, score: winner.score || 0, fromGroup: group.name, fromCirco: group.circo, fromEcole: group.ecole });
        log(`🏆 ${group.name}: ${winner.name} gagne (${winner.score || 0} pts)`, 'ok');
        sendMonitoringEvent('arena:match-end', { matchId, winner: winner.name, score: winner.score, group: group.name });
      } else {
        log(`❌ ${group.name}: aucun joueur — pas de gagnant`, 'err');
      }
      totalMatchesDone++;
      updateMatchCard(matchId);
      updateStats();
      // Disconnect bots after short delay
      setTimeout(() => {
        bots.forEach(b => { if (b.pairTimer) clearTimeout(b.pairTimer); if (b.socket?.connected) b.socket.disconnect(); });
      }, 2000);
      resolve();
    }

    // Connect each bot
    students.forEach((student, idx) => {
      const skillMult = am.players[idx].skillMult;
      const sock = io(apiUrl(), { transports: ['websocket', 'polling'], reconnection: false, timeout: 15000 });
      const bot = { socket: sock, student, skillMult, pairTimer: null, currentZones: null };
      bots.push(bot);
      am.bots.push(bot);

      sock.on('connect', () => {
        sock.emit('arena:join', {
          matchId,
          studentData: { studentId: student.id, authId: `bot-${student.id}`, name: student.label || student.name, avatar: '/avatars/default.png' }
        });
        setTimeout(() => {
          sock.emit('arena:ready', { studentId: student.id });
          botsReady++;
          if (botsReady === students.length) {
            am.status = 'playing';
            updateMatchCard(matchId);
            // Force start via orchestrator socket
            setTimeout(() => {
              orchestratorSocket.emit('arena:force-start', { matchId }, (resp) => {
                if (resp?.ok) log(`▶ ${group.name} démarré`, 'info');
                else log(`⚠ ${group.name} force-start: ${JSON.stringify(resp)}`, 'warn');
              });
            }, 500);
          }
        }, 300 + Math.random() * 500);
      });

      function scheduleFind() {
        if (matchEnded || !bot.currentZones) return;
        const delay = getDelay(speed, skillMult);
        bot.pairTimer = setTimeout(() => {
          bot.pairTimer = null;
          if (matchEnded || !bot.currentZones) return;
          const pair = findCorrectPair(bot.currentZones);
          if (!pair) return;
          sock.emit('arena:pair-validated', {
            matchId, studentId: student.id, isCorrect: true,
            timeMs: delay, pairId: pair.a.pairId, zoneAId: pair.a.id, zoneBId: pair.b.id
          });
        }, delay);
      }

      sock.on('arena:game-start', (d) => {
        bot.currentZones = d.zones || [];
        scheduleFind();
      });
      sock.on('arena:round-new', (d) => {
        bot.currentZones = d.zones || [];
        if (bot.pairTimer) { clearTimeout(bot.pairTimer); bot.pairTimer = null; }
        scheduleFind();
      });
      sock.on('arena:pair-validated', (d) => {
        if (bot.pairTimer) { clearTimeout(bot.pairTimer); bot.pairTimer = null; }
        bot.currentZones = null;
        if (d.studentId === student.id) totalPairsValidated++;
      });
      sock.on('arena:scores-update', (d) => {
        for (const s of (d.scores || [])) {
          const p = am.players.find(pl => pl.studentId === s.studentId);
          if (p) p.score = s.score || 0;
        }
        updateMatchCard(matchId);
        updateStats();
      });
      sock.on('arena:game-end', (d) => {
        const winner = d?.winner || (d?.ranking && d.ranking[0]) || null;
        onMatchEnd(winner);
      });
      sock.on('arena:tie-detected', () => {
        am.status = 'tie';
        updateMatchCard(matchId);
        sendIncident('tie-detected', 'warning', { matchId, group: group.name, scores: am.players.map(p => ({ name: p.name, score: p.score })) });
        // Bots auto-ready for tiebreaker
        setTimeout(() => {
          bots.forEach(b => {
            b.socket.emit('arena:player-ready-tiebreaker', { matchId, studentId: b.student.id, playerName: b.student.name });
          });
        }, 1000);
      });
      sock.on('arena:tiebreaker-start', (d) => {
        am.status = 'playing';
        updateMatchCard(matchId);
        bot.currentZones = d.zones || [];
        if (bot.pairTimer) { clearTimeout(bot.pairTimer); bot.pairTimer = null; }
        scheduleFind();
      });
      sock.on('connect_error', (err) => {
        totalErrors++;
        log(`❌ ${student.name}: ${err.message}`, 'err');
        sendIncident('bot-connect-error', 'error', { matchId, student: student.name, error: err.message });
      });

    });

    // Safety timeout — ONE per match (not per bot)
    const maxDuration = (+document.getElementById('cfgRounds').value) * (+document.getElementById('cfgDuration').value) * 1000 + 45000;
    setTimeout(() => {
      if (!matchEnded) {
        log(`⏰ ${group.name} timeout (${Math.round(maxDuration/1000)}s)`, 'warn');
        onMatchEnd(null); // fallback in onMatchEnd picks best player
      }
    }, maxDuration);
  });
}

// ═══════════════════════════════════════
// PREPARE NEXT PHASE
// ═══════════════════════════════════════
async function prepareNextPhase() {
  const prevPhase = currentPhase;
  const nextLevel = prevPhase + 1;
  const winners = phases[prevPhase].winners;

  log(`📌 Préparation Phase ${nextLevel}...`, 'info');

  // Create next phase
  const pRes = await apiPost('/api/tournament/phases', { tournamentId, level: nextLevel, status: 'active' });
  phases[nextLevel] = { id: pRes.phase.id, groups: [], matches: [], winners: [] };

  // Group winners by:
  // Phase 2 (école): winners from same école
  // Phase 3 (circo): winners from same circo
  // Phase 4 (académique): all remaining winners
  let groupedWinners = [];
  if (nextLevel === 2) {
    // Group by école
    const byEcole = {};
    winners.forEach(w => {
      const key = `${w.fromCirco}/${w.fromEcole}`;
      if (!byEcole[key]) byEcole[key] = { name: `${w.fromCirco} / ${w.fromEcole}`, circo: w.fromCirco, ecole: w.fromEcole, players: [] };
      byEcole[key].players.push(w);
    });
    groupedWinners = Object.values(byEcole);
  } else if (nextLevel === 3) {
    // Group by circo
    const byCirco = {};
    winners.forEach(w => {
      const key = w.fromCirco;
      if (!byCirco[key]) byCirco[key] = { name: w.fromCirco, circo: w.fromCirco, ecole: '', players: [] };
      byCirco[key].players.push(w);
    });
    groupedWinners = Object.values(byCirco);
  } else {
    // Phase 4: all in one or few groups of max 4
    const all = [...winners];
    while (all.length > 0) {
      const chunk = all.splice(0, 4);
      groupedWinners.push({ name: `Finale Académique #${groupedWinners.length + 1}`, circo: 'Académie', ecole: '', players: chunk });
    }
  }

  // Filter out groups with < 2 players (can't have a match)
  groupedWinners = groupedWinners.filter(g => g.players.length >= 2);

  // Create groups and matches
  const matchConfig = {
    rounds: +document.getElementById('cfgRounds').value,
    duration: +document.getElementById('cfgDuration').value,
    classes: NIVEAUX,
    themes: ['botanique', 'multiplication']
  };

  for (const grp of groupedWinners) {
    // If group > 4 players, split into sub-groups of 4
    const subGroups = [];
    const allP = [...grp.players];
    while (allP.length > 0) {
      subGroups.push(allP.splice(0, 4));
    }

    for (let si = 0; si < subGroups.length; si++) {
      const subPlayers = subGroups[si];
      const gName = subGroups.length > 1 ? `${grp.name} (${si + 1})` : grp.name;
      const studentIds = subPlayers.map(p => p.studentId);
      const gRes = await apiPost('/api/tournament/groups', { tournamentId, phaseLevel: nextLevel, name: gName, studentIds });
      
      const groupData = {
        id: gRes.group.id, name: gName,
        students: subPlayers.map(p => ({ id: p.studentId, name: p.name, label: p.name })),
        circo: grp.circo, ecole: grp.ecole, classe: ''
      };
      phases[nextLevel].groups.push(groupData);

      const mRes = await apiPost('/api/tournament/matches', { tournamentId, phaseId: phases[nextLevel].id, groupId: gRes.group.id, config: matchConfig });
      groupData.matchId = mRes.match.id;
      groupData.roomCode = mRes.match.room_code;
      phases[nextLevel].matches.push({ id: mRes.match.id, roomCode: mRes.match.room_code, groupId: gRes.group.id, group: groupData });
    }
  }

  log(`Phase ${nextLevel}: ${phases[nextLevel].groups.length} groupes, ${phases[nextLevel].matches.length} matchs`, 'ok');
  currentPhase = nextLevel;
  totalMatchesDone = 0;
  renderPhaseTabs();
  renderMatchGrid();
  updateStats();
}

function watchMatch(matchId, roomCode) {
  const am = activeMatches.get(matchId);
  const players = am?.players || [];
  const status = am?.status || 'unknown';
  const scores = players.map(p => `${p.name}: ${p.score || 0} pts`).join('\n');
  const info = `Match: ${matchId.slice(-12)}\nRoom: ${roomCode}\nStatut: ${status}\n\nJoueurs:\n${scores}`;

  // Open a floating panel
  let panel = document.getElementById('watchPanel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'watchPanel';
    panel.style.cssText = 'position:fixed;top:60px;right:20px;width:320px;max-height:80vh;background:#1e293b;border:2px solid #7c3aed;border-radius:12px;padding:16px;z-index:9999;font-family:Inter,sans-serif;color:#e2e8f0;box-shadow:0 8px 32px rgba(0,0,0,0.5);overflow-y:auto';
    document.body.appendChild(panel);
  }

  // Set up live update
  panel.dataset.matchId = matchId;
  updateWatchPanel(matchId, roomCode);

  // Auto-refresh every 500ms
  if (panel._interval) clearInterval(panel._interval);
  panel._interval = setInterval(() => {
    if (panel.dataset.matchId === matchId) updateWatchPanel(matchId, roomCode);
    else clearInterval(panel._interval);
  }, 500);
}

function updateWatchPanel(matchId, roomCode) {
  const panel = document.getElementById('watchPanel');
  if (!panel) return;
  const am = activeMatches.get(matchId);
  const players = am?.players || [];
  const status = am?.status || 'unknown';
  const statusColors = { waiting: '#64748b', playing: '#10b981', tie: '#f59e0b', finished: '#6366f1' };

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">`;
  html += `<span style="font-weight:700;font-size:1.1em">👁️ Match en direct</span>`;
  html += `<button onclick="closeWatchPanel()" style="background:none;border:none;color:#ef4444;font-size:1.2em;cursor:pointer">✖</button></div>`;
  html += `<div style="background:#0f172a;border-radius:8px;padding:10px;margin-bottom:8px">`;
  html += `<div style="font-size:.8em;color:#94a3b8">Room: <b style="color:#22d3ee">${roomCode}</b> | ${matchId.slice(-10)}</div>`;
  html += `<div style="margin-top:4px"><span style="padding:2px 8px;border-radius:4px;font-size:.75em;font-weight:700;background:${statusColors[status] || '#334155'};color:#fff">${status.toUpperCase()}</span></div></div>`;

  // Player scores - sorted by score
  const sorted = [...players].sort((a, b) => (b.score || 0) - (a.score || 0));
  html += `<div style="display:flex;flex-direction:column;gap:6px">`;
  sorted.forEach((p, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
    const barWidth = players.length > 0 ? Math.max(5, ((p.score || 0) / Math.max(...players.map(x => x.score || 1))) * 100) : 0;
    const isWinner = am?.winner && p.studentId === am.winner.studentId;
    html += `<div style="background:${isWinner ? '#064e3b' : '#0f172a'};border-radius:6px;padding:8px;${isWinner ? 'border:1px solid #10b981' : ''}">`;
    html += `<div style="display:flex;justify-content:space-between;align-items:center">`;
    html += `<span style="font-weight:600">${medal} ${p.name}</span>`;
    html += `<span style="font-size:1.3em;font-weight:800;color:#fbbf24">${p.score || 0}</span></div>`;
    html += `<div style="height:4px;background:#1e2048;border-radius:2px;margin-top:4px;overflow:hidden">`;
    html += `<div style="height:100%;width:${barWidth}%;background:linear-gradient(90deg,#7c3aed,#22d3ee);transition:width .3s"></div></div></div>`;
  });
  html += `</div>`;

  if (status === 'finished' && am?.winner) {
    html += `<div style="text-align:center;margin-top:12px;padding:8px;background:#064e3b;border-radius:8px;border:1px solid #10b981">`;
    html += `<div style="font-size:1.5em">🏆</div><div style="font-weight:700">${am.winner.name} gagne !</div></div>`;
  }

  panel.innerHTML = html;
}

function closeWatchPanel() {
  const panel = document.getElementById('watchPanel');
  if (panel) {
    if (panel._interval) clearInterval(panel._interval);
    panel.remove();
  }
}

function stopAll() {
  running = false;
  for (const [, am] of activeMatches) {
    (am.bots || []).forEach(b => {
      if (b.pairTimer) clearTimeout(b.pairTimer);
      if (b.socket?.connected) b.socket.disconnect();
    });
  }
  flushMonitoring();
  if (orchestratorSocket?.connected) orchestratorSocket.disconnect();
  orchestratorSocket = null;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnLaunch').disabled = false;
  log('⏹ Tout arrêté', 'warn');
}
</script>
</body>
</html>
